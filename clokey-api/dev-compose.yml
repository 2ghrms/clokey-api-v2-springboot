version: "3.8"

services:
  redis-dev:
    image: redis:7-alpine
    container_name: clokey-redis-dev
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server; fi"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev_app_network

  app:
    image: ${DOCKERHUB_USERNAME}/clokey-docker-2025:${DOCKER_TAG}
    container_name: clokey-app-dev
    pull_policy: always
    depends_on:
      - redis-dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: Asia/Seoul

      # Domain
      CODIVE_DEV_BASE_URL: ${CODIVE_DEV_BASE_URL}
      CODIVE_PROD_BASE_URL: ${CODIVE_PROD_BASE_URL}

      # Database (MySQL HeatWave)
      OCI_MYSQL_HEATWAVE_HOST: ${OCI_MYSQL_HEATWAVE_HOST}
      MYSQL_PORT: 3306
      OCI_DEV_MYSQL_DB_NAME: ${OCI_DEV_MYSQL_DB_NAME}
      OCI_MYSQL_USERNAME: ${OCI_MYSQL_USERNAME}
      OCI_MYSQL_PASSWORD: ${OCI_MYSQL_PASSWORD}

      # Redis
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Kakao OIDC
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}

      # Apple OIDC
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI}

      # Firebase
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-sa.json

      # JWT
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_TIME: ${JWT_ACCESS_TOKEN_EXPIRATION_TIME}
      JWT_REFRESH_TOKEN_EXPIRATION_TIME: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME}
      JWT_ISSUER: ${JWT_ISSUER}

      # OCI Object Storage
      OCI_TENANCY_ID: ${OCI_TENANCY_ID}
      OCI_USER_ID: ${OCI_USER_ID}
      OCI_FINGERPRINT: ${OCI_FINGERPRINT}
      OCI_PRIVATE_KEY: ${OCI_PRIVATE_KEY}
      OCI_REGION: ${OCI_REGION}
      OCI_PASSPHRASE: ${OCI_PASSPHRASE}
      OCI_OBJECTSTORAGE_NAMESPACE: ${OCI_OBJECTSTORAGE_NAMESPACE}
      OCI_DEV_OBJECTSTORAGE_BUCKET: ${OCI_DEV_OBJECTSTORAGE_BUCKET}

      # Swagger
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}

      AI_SERVER_IP: ${AI_SERVER_IP}
      CLOTH_INFERENCE_PATH: ${CLOTH_INFERENCE_PATH}
      STYLE_INFERENCE_PATH: ${STYLE_INFERENCE_PATH}
      CLOTH_DETECT_PATH: ${CLOTH_DETECT_PATH}

      # MeilieSearch
      MEILISEARCH_ENDPOINT: ${MEILISEARCH_ENDPOINT}
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}

      # External API (AI)
      AI_SERVER_IP: ${AI_SERVER_IP}
      CLOTH_INFERENCE_PATH: ${CLOTH_INFERENCE_PATH}
      STYLE_INFERENCE_PATH: ${STYLE_INFERENCE_PATH}
      HISTORY_CLOTH_DETECT_PATH: ${HISTORY_CLOTH_DETECT_PATH}

    volumes:
      - /home/ubuntu/secrets/firebase-sa.json:/run/secrets/firebase-sa.json:ro

    networks:
      - dev_app_network

networks:
  dev_app_network:
    name: dev_app_network
    driver: bridge

volumes:
  redis_dev_data:

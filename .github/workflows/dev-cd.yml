name: Clokey-Dev CD

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "clokey-api/**"
      - "clokey-domain/**"
      - "clokey-common/**"
      - "clokey-common-web/**"
      - ".github/workflows/ci.yml"

jobs:
  dev-cd:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push App Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --file clokey-api/Dockerfile \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/clokey-docker-2025:dev-app \
            .

      - name: Copy dev-docker-compose.yml
        uses: appleboy/scp-action@v0.1.3
        with:
          username: ubuntu
          host: ${{ secrets.DEV_EC2_HOST }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          source: ./clokey-api/dev-compose.yml
          target: /home/ubuntu/

      - name: Deploy App
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.DEV_EC2_HOST }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DEV_MYSQL_HOST,MYSQL_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,DEV_KAKAO_CLIENT_ID,DEV_KAKAO_CLIENT_SECRET,DEV_APPLE_CLIENT_ID,DEV_APPLE_CLIENT_SECRET,JWT_ACCESS_TOKEN_SECRET,JWT_REFRESH_TOKEN_SECRET,JWT_ACCESS_TOKEN_EXPIRATION_TIME,JWT_REFRESH_TOKEN_EXPIRATION_TIME,JWT_ISSUER,OCI_TENANCY_ID,OCI_USER_ID,OCI_FINGERPRINT,OCI_PRIVATE_KEY,OCI_REGION,OCI_PASSPHRASE,OCI_OBJECTSTORAGE_NAMESPACE,OCI_OBJECTSTORAGE_BUCKET,SWAGGER_USERNAME,SWAGGER_PASSWORD,FIREBASE_SA_JSON_B64,AI_SERVER_IP,CLOTH_INFERENCE_PATH,STYLE_INFERENCE_PATH,CLOTH_DETECT_PATH,MEILISEARCH_ENDPOINT,MEILISEARCH_KEY
          script: |
            export DOCKERHUB_NAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DOCKER_TAG=dev-app

            export DEV_MYSQL_HOST=${{ secrets.DEV_MYSQL_HOST }}
            export MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            export DB_NAME=${{ secrets.DB_NAME }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            export REDIS_HOST=${{ secrets.REDIS_HOST }}
            export REDIS_PORT=${{ secrets.REDIS_PORT }}
            export REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

            export KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            export KAKAO_CLIENT_SECRET=${{ secrets.DEV_KAKAO_CLIENT_SECRET }}

            export APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
            export APPLE_CLIENT_SECRET=${{ secrets.APPLE_CLIENT_SECRET }}

            export JWT_ACCESS_TOKEN_SECRET=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}
            export JWT_REFRESH_TOKEN_SECRET=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}
            export JWT_ACCESS_TOKEN_EXPIRATION_TIME=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_TIME }}
            export JWT_REFRESH_TOKEN_EXPIRATION_TIME=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION_TIME }}
            export JWT_ISSUER=${{ secrets.JWT_ISSUER }}

            export OCI_TENANCY_ID=${{ secrets.DEV_OCI_TENANCY_ID }}
            export OCI_USER_ID=${{ secrets.DEV_CI_USER_ID }}
            export OCI_FINGERPRINT=${{ secrets.DEV_OCI_FINGERPRINT }}
            export OCI_PRIVATE_KEY=${{ secrets.DEV_OCI_PRIVATE_KEY }}
            export OCI_REGION=${{ secrets.DEV_OCI_REGION }}
            export OCI_PASSPHRASE=${{ secrets.DEV_OCI_PASSPHRASE }}
            export OCI_OBJECTSTORAGE_NAMESPACE=${{ secrets.DEV_OCI_OBJECTSTORAGE_NAMESPACE }}
            export OCI_OBJECTSTORAGE_BUCKET=${{ secrets.DEV_OCI_OBJECTSTORAGE_BUCKET }}

            export SWAGGER_USERNAME=${{ secrets.SWAGGER_USERNAME }}
            export SWAGGER_PASSWORD=${{ secrets.SWAGGER_PASSWORD }}
            
            export MEILISEARCH_ENDPOINT=${{ secrets.MEILISEARCH_ENDPOINT }}
            export MEILISEARCH_KEY=${{ secrets.MEILISEARCH_KEY }}

            export AI_SERVER_IP=${{ secrets.AI_SERVER_IP }}
            export CLOTH_INFERENCE_PATH=${{ secrets.CLOTH_INFERENCE_PATH }}
            export STYLE_INFERENCE_PATH=${{ secrets.STYLE_INFERENCE_PATH }}
            export CLOTH_DETECT_PATH=${{ secrets.CLOTH_DETECT_PATH }}

            sudo mkdir -p /home/ubuntu/secrets
            echo "${{ secrets.FIREBASE_SA_JSON_B64 }}" | base64 -d | sudo tee /home/ubuntu/secrets/firebase-sa.json > /dev/null
            sudo chmod 600 /home/ubuntu/secrets/firebase-sa.json

            export FIREBASE_CREDENTIALS_PATH=/home/ubuntu/secrets/firebase-sa.json

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd /home/ubuntu
            docker compose -f clokey-api/dev-compose.yml up -d
            
            echo "Cleaning up dangling Docker images..."
            docker image prune -f
            
